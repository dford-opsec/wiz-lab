name: "2. Build, Scan, and Deploy App"

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'app/**'       # Triggers if any file in the application source folder changes [cite: 59, 79]
      - 'k8s/**'       # Triggers if your Kubernetes manifests are updated [cite: 70, 79]
      - '.github/workflows/app-deploy.yml' # Triggers if you modify this pipeline itself [cite: 72]
env:
  # Standard GCR path. If using Artifact Registry, format is: region-docker.pkg.dev/project/repo/image
  IMAGE_NAME: gcr.io/${{ secrets.GCP_PROJECT_ID }}/wiz-webapp:latest 

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: Configure Docker for GCP
        run: gcloud auth configure-docker

      - name: Build Docker Image
        # Assuming your Dockerfile and app code are in an 'app' folder
        run: docker build -t ${{ env.IMAGE_NAME }} ./app 

      # Fulfills the requirement: "scanning the... Container Image prior to deployment"
      - name: Security Scan Image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}
          format: 'table'
          exit-code: '0' # Soft fail so the vulnerable app still deploys for the demo
          ignore-unfixed: true               # Only flag vulnerabilities that actually have a patch available
          vuln-type: 'os,library'            # Scans both the base OS (Linux) and Go packages
          # severity: 'CRITICAL,HIGH'        # We only care about the big ones          

      - name: Push Docker Image to GCP
        run: docker push ${{ env.IMAGE_NAME }}

      - name: Get GKE Cluster Credentials
        uses: google-github-actions/get-gke-credentials@v1
        with:
          cluster_name: wiz-private-cluster
          location: us-central1-a
          
      - name: Create Required Firewall Rules
        run: |
          # 1. Find the dynamic network name from the running VM
          MY_NET=$(gcloud compute instances list --limit=1 --format="value(networkInterfaces[0].network.basename())")
          echo "Targeting network: $MY_NET"

          # 2. Allow Load Balancer Health Checks (for the Ingress)
          gcloud compute firewall-rules create allow-lb-health-checks \
            --network=$MY_NET \
            --action=allow \
            --direction=ingress \
            --source-ranges=130.211.0.0/22,35.191.0.0/16 \
            --rules=tcp || echo "LB firewall rule already exists, skipping."

          # 3. Allow K8s Pods to talk to MongoDB on port 27017
          gcloud compute firewall-rules create allow-internal-mongodb \
            --network=$MY_NET \
            --action=allow \
            --direction=ingress \
            --source-ranges=10.0.0.0/8 \
            --rules=tcp:27017 || echo "MongoDB firewall rule already exists, skipping."
            
      - name: Deploy Manifests to GKE
        run: |
          # 1. Fetch the Internal IP of your MongoDB VM
          MONGODB_IP=$(gcloud compute instances describe wiz-mongodb-vm \
            --zone us-central1-a \
            --format='get(networkInterfaces[0].networkIP)')
          
          echo "Injecting IP: $MONGODB_IP into deployment manifest"

          # 2. Use sed to replace the placeholder including the brackets
          sed -i "s|<MONGODB_VM_INTERNAL_IP>|$MONGODB_IP|g" k8s/02-deployment.yml

          # 3. Verify the change (Optional, helpful for debugging)
          cat k8s/02-deployment.yml | grep MONGODB_URI

          # 4. ACTUALLY DEPLOY THE FILES
          kubectl apply -f k8s/01-rbac.yml
          kubectl apply -f k8s/02-deployment.yml
          kubectl apply -f k8s/04-backendconfig.yml
          kubectl apply -f k8s/03-ingress.yml

      - name: Deploy Custom Log-Based Metrics
        run: |
          echo "Deploying custom metric: mongo_vm_ssh_logins..."
          
          # Creates the log-based metric if it doesn't exist.
          # The filter looks for successful SSH authentications in syslog.
          gcloud logging metrics create mongo_vm_ssh_logins \
            --description="Counts successful SSH logins for the SSH Login Spike alert" \
            --log-filter='resource.type="gce_instance" AND logName=~"logs/syslog" AND (textPayload=~"sshd.*Accepted" OR jsonPayload.message=~"sshd.*Accepted")' \
            || echo "⚠️ Metric already exists. Skipping creation."
            
          echo "✅ Log-based metrics deployed!"

      - name: Deploy Detection as Code (Alert Policies)
        run: |
          echo "Deploying SOC Alerts from the alerts/ directory..."
          
          # Loop through every YAML file in the alerts folder
          for policy_file in alerts/*.yaml; do
            echo "Attempting to deploy: $policy_file"
            
            # Create the policy. If it already exists, it prints a message and continues.
            gcloud monitoring policies create \
              --policy-from-file="$policy_file" || echo "⚠️ Policy may already exist or have a formatting issue. Skipping..."
              
          done
          
          echo "✅ All alert policies processed!"
